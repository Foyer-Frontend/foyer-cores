name: Build cores

# Builds every recipe'd libretro core into a foyer-<core>.nro for the Switch
# and attaches them to a GitHub release. The release also includes a
# manifest.json that foyer's Settings → Install Cores can read to resolve
# downloads + sha256s.
#
# Triggers on tag push v*.*.*; manual dispatch is supported for dry-runs
# (no release published unless the ref is a tag).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      foyer_ref:
        description: 'foyer ref to build against (default: main)'
        default: main
        required: false

permissions:
  contents: write
  packages: read

env:
  FOYER_REPO: foyer-frontend/foyer

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # foyer-cores-builder bakes the Switch portlibs on top of
      # devkitpro/devkita64 so matrix jobs don't depend on
      # pkg.devkitpro.org's flaky CDN at runtime. Built by
      # build-image.yml. The package is private to the org by default;
      # GITHUB_TOKEN with packages:read gives the runner pull access.
      image: ghcr.io/foyer-frontend/foyer-cores-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        core:
          - fceumm
          - nestopia
          - gambatte
          - snes9x
          - mgba
          - melonds
          - mupen64plus
          - genesisplusgx
          - picodrive
          - yabasanshiro
          - flycast
          - pcsx_rearmed
          - swanstation
          - race
          - handy
          - prosystem
          - stella
          - genesis_plus_gx_wide
          - vba_next
          - mednafen_ngp
          - mednafen_lynx
          - bsnes_hd_beta
          - mesen
          - sameboy
          - gpsp
          # mesen + sameboy temporarily off the matrix — both need
          # generated assets / vendored deps that the recipes don't
          # handle yet (mesen: HQX/xBRZ scalers + SevenZip; sameboy:
          # bootroms generated from BootROMs/prebuilt/*.bin).
    steps:
      - name: Checkout foyer-cores
        uses: actions/checkout@v4
        with:
          path: foyer-cores

      - name: Checkout foyer
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FOYER_REPO }}
          ref: ${{ github.event.inputs.foyer_ref || 'main' }}
          path: foyer
          fetch-depth: 0

      - name: Trust the workspace inside container
        run: git config --global --add safe.directory '*'

      # (Switch portlibs are pre-installed in the builder image.)

      # Direct cmake invocation rather than `cmake --preset` so newly-added
      # cores work without an entry in foyer's CMakePresets.json.
      - name: Configure
        env:
          DEVKITPRO: /opt/devkitpro
        working-directory: foyer
        run: |
          cmake -B build/Player-${{ matrix.core }} \
              --toolchain "$DEVKITPRO/cmake/Switch.cmake" \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -DBUILD_BROWSER=OFF \
              -DBUILD_PLAYER=ON \
              -DFOYER_CORE=${{ matrix.core }}

      - name: Build
        working-directory: foyer
        run: cmake --build build/Player-${{ matrix.core }} -j

      - name: Stage artefact
        working-directory: foyer
        run: |
          mkdir -p ../out
          cp build/Player-${{ matrix.core }}/foyer-${{ matrix.core }}.nro ../out/

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: foyer-${{ matrix.core }}
          path: out/foyer-${{ matrix.core }}.nro

  release:
    needs: build
    # `always()` so the release publishes whatever cores DID build, even if
    # one of the matrix jobs failed. fail-fast is already off, so the rest
    # of the matrix runs to completion regardless. The downloaded artefacts
    # bundle determines what makes it into manifest.json + the release.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate manifest + checksums
        run: |
          mkdir -p out
          cp artifacts/*.nro out/
          ( cd out && sha256sum *.nro > sha256sums.txt )

          version="${GITHUB_REF_NAME#v}"
          {
            echo '{'
            echo "  \"version\": \"${version}\","
            echo '  "cores": ['
            first=1
            for nro in $(ls out/foyer-*.nro | sort); do
              name=$(basename "$nro" .nro | sed 's/^foyer-//')
              size=$(stat -c%s "$nro")
              sum=$(sha256sum "$nro" | cut -d' ' -f1)
              url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/$(basename $nro)"
              [ $first -eq 0 ] && echo ','
              first=0
              printf '    { "name": "%s", "version": "%s", "nro": "%s", "size": %d, "sha256": "%s", "url": "%s" }' \
                "$name" "$version" "$(basename $nro)" "$size" "$sum" "$url"
            done
            echo
            echo '  ]'
            echo '}'
          } > out/manifest.json
          cat out/manifest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.nro
            out/manifest.json
            out/sha256sums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
