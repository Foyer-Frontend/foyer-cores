name: Build cores

# Smart-matrix nightly + on-tag-push. Each matrix job's first step probes the
# core's upstream (git ls-remote on its branch ref, or literal pin) and
# compares against the upstream fingerprint recorded in the previous release's
# manifest.json. Unchanged cores skip Configure/Build/Stage entirely — only
# the cores that actually moved get rebuilt. The release job then merges the
# fresh artefacts with carried-over manifest entries from the previous
# release, so every published manifest lists ALL cores even when only a
# handful built that day. Foyer's `cores_manifest_url` hits
# /releases/latest/download/manifest.json and pulls each .nro from whichever
# release URL the manifest names — unchanged cores' URLs continue pointing at
# their last-built release.

on:
  push:
    tags:
      # CalVer: YYYY.MM.DD[.NN] — zero-padded NN suffix for same-day
      # re-cuts (.01, .02, …). Old v*.*.* tags stay matched for any
      # legacy semver tag cherry-picked into the rotation.
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].*'
      - 'v*.*.*'
  schedule:
    # Nightly at 03:00 UTC. Most upstreams are quiet that hour so we won't
    # race a libretro merge while building.
    - cron: '0 3 * * *'
  repository_dispatch:
    # Fired by foyer/.github/workflows/cores-autotag.yml whenever a
    # commit on foyer's main touches shared/ or player/ — code that
    # links into every foyer-<core>.nro. Treated as a force-rebuild,
    # tag named after today's UTC date (with zero-padded suffix on
    # collisions).
    types: [foyer-source-change]
  workflow_dispatch:
    inputs:
      foyer_ref:
        description: 'foyer ref to build against (default: main)'
        default: main
        required: false
      force_rebuild_all:
        description: 'Ignore the smart-matrix skip and rebuild every core'
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

env:
  FOYER_REPO: foyer-frontend/foyer

jobs:
  # Resolve the release tag once so matrix + release jobs agree on a single
  # CalVer string. Tag pushes inherit GITHUB_REF_NAME; schedule + dispatch
  # compute YYYY.MM.DD, appending .N if a release with that tag already
  # exists (re-runs same day).
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prev_manifest_url: ${{ steps.tag.outputs.prev_manifest_url }}
      force_rebuild: ${{ steps.tag.outputs.force_rebuild }}
    steps:
      - name: Compute tag + locate previous manifest
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            # CalVer with zero-padded same-day suffix. Probes both the
            # release list (visible by API) and the raw git tag list
            # (in case a tag was pushed but the release publish step
            # failed last time around) so we never collide with an
            # in-flight rebuild.
            base=$(date -u +%Y.%m.%d)
            tag="$base"
            existing_releases=$(gh release list --repo "${{ github.repository }}" --limit 200 --json tagName --jq '.[].tagName' || true)
            existing_tags=$(gh api repos/${{ github.repository }}/git/matching-refs/tags/$base --jq '.[].ref | sub("refs/tags/"; "")' 2>/dev/null || true)
            all_existing=$(printf '%s\n%s\n' "$existing_releases" "$existing_tags" | sort -u)
            if echo "$all_existing" | grep -qx "$base"; then
              max=0
              while read -r candidate; do
                [ -z "$candidate" ] && continue
                suffix=${candidate#${base}.}
                [ "$suffix" = "$candidate" ] && continue
                # Only NN-shaped suffixes count toward the bump; ignore
                # arbitrary text in case a release was hand-named.
                case "$suffix" in
                  ''|*[!0-9]*) continue ;;
                esac
                num=$((10#$suffix))
                [ "$num" -gt "$max" ] && max="$num"
              done <<< "$all_existing"
              next=$((max + 1))
              tag=$(printf "%s.%02d" "$base" "$next")
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prev_manifest_url=https://github.com/${{ github.repository }}/releases/latest/download/manifest.json" >> "$GITHUB_OUTPUT"

          # Tag pushes + repository_dispatch from foyer force full
          # rebuild. Tag = deliberate "publish a fresh batch"
          # gesture; dispatch = foyer's shared/ or player/ changed,
          # which feeds into every nro. Scheduled cron uses the
          # smart-matrix skip path; workflow_dispatch defaults to
          # smart, with a force_rebuild_all checkbox for manual
          # fulls.
          force=false
          if [ "${{ github.event_name }}" = "push" ]; then
            force=true
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            force=true
          elif [ "${{ github.event.inputs.force_rebuild_all }}" = "true" ]; then
            force=true
          fi
          echo "force_rebuild=$force" >> "$GITHUB_OUTPUT"
          echo "force_rebuild resolved to $force (event=${{ github.event_name }})"

  build:
    needs: plan
    runs-on: ubuntu-latest
    container:
      # foyer-cores-builder bakes the Switch portlibs on top of
      # devkitpro/devkita64 so matrix jobs don't depend on
      # pkg.devkitpro.org's flaky CDN at runtime. Built by
      # build-image.yml. The package is private to the org by default;
      # GITHUB_TOKEN with packages:read gives the runner pull access.
      image: ghcr.io/foyer-frontend/foyer-cores-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        core:
          - fceumm
          - nestopia
          - gambatte
          - snes9x
          - mgba
          - melonds
          - mupen64plus
          - genesisplusgx
          - picodrive
          - yabasanshiro
          - flycast
          - pcsx_rearmed
          - swanstation
          - race
          - handy
          - prosystem
          - stella
          - genesis_plus_gx_wide
          - vba_next
          - mednafen_ngp
          - mednafen_lynx
          - bsnes_hd_beta
          - mesen
          - sameboy
          - gpsp
          # parallel_n64 — disabled. Upstream link error chain
          # (undefined: memory_layout, g_frameCheatStatus,
          # g_cheatStatus, …). Recipe needs a broader source-file
          # audit or upstream rollback; until then keep it out of
          # the matrix so the rest of the cores publish cleanly.
          # - parallel_n64
          - mednafen_psx_hw
          - ppsspp
          - prboom
          - tyrquake
          - stella2014
          - beetle_pce
          - dosbox_pure
          - caprice32
          - beetle_wswan
          - beetle_vb
          - beetle_supergrafx
          - beetle_pcfx
          - mednafen_pce_fast
          - tgbdual
          - retro8
          - freeintv
          - reminiscence
          - virtualjaguar
          - pokemini
          - gw
          - snes9x2010
          - frodo
          - fmsx
          - atari800
          - nxengine
          - opera
          - mame2003_plus
          # scummvm — disabled. Cap-to-j4 build takes ~45 min on the
          # matrix runner (huge codebase, no ccache hit on first compile),
          # bloating every release. Re-enable once we have a way to
          # cache its objects across runs.
          # - scummvm
          - puae
          # mesen + sameboy need generated assets / vendored deps that the
          # recipes don't handle yet (mesen: HQX/xBRZ scalers + SevenZip;
          # sameboy: bootroms generated from BootROMs/prebuilt/*.bin).
    steps:
      - name: Checkout foyer-cores
        uses: actions/checkout@v5
        with:
          path: foyer-cores

      - name: Trust the workspace inside container
        run: git config --global --add safe.directory '*'

      # Smart-matrix gate. ls-remote each upstream named in the recipe + read
      # the previous manifest's recorded fingerprint. Outputs should_build=true
      # whenever upstream moved, the recipe file changed, no previous entry
      # exists, or the user passed force_rebuild_all. Every downstream step
      # in this job is gated on that flag — when false, the runner spends
      # ~5s here and then idles past the rest.
      - name: Probe upstream + decide skip-vs-build
        id: gate
        run: |
          set -e
          recipe=foyer-cores/recipes/${{ matrix.core }}.cmake
          if [ ! -f "$recipe" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "no recipe for ${{ matrix.core }} — skipping"
            exit 0
          fi

          new_fp=$(python3 foyer-cores/.github/scripts/upstream_fingerprint.py "$recipe")
          new_recipe_sha=$(sha1sum "$recipe" | cut -d' ' -f1)
          echo "new fingerprint: $new_fp"
          echo "new recipe sha: $new_recipe_sha"

          prev_fp=""
          prev_recipe_sha=""
          # jq isn't guaranteed to be installed inside the builder
          # container, so parse with a tiny python helper script
          # (python3 ships in devkitPro's debian base).
          if curl -fsSL -o prev_manifest.json "${{ needs.plan.outputs.prev_manifest_url }}"; then
            lookup=foyer-cores/.github/scripts/manifest_lookup.py
            prev_fp=$(python3 "$lookup" prev_manifest.json "${{ matrix.core }}" upstream_fingerprint)
            prev_recipe_sha=$(python3 "$lookup" prev_manifest.json "${{ matrix.core }}" recipe_sha)
          fi
          echo "prev fingerprint: $prev_fp"
          echo "prev recipe sha: $prev_recipe_sha"

          should=false
          if [ "${{ needs.plan.outputs.force_rebuild }}" = "true" ]; then
            should=true
            echo "force_rebuild_all dispatch flag set — building"
          elif [ -z "$prev_fp" ] && [ -z "$prev_recipe_sha" ]; then
            should=true
            echo "no prior manifest entry — building"
          elif [ "$new_fp" != "$prev_fp" ]; then
            should=true
            echo "upstream fingerprint changed — building"
          elif [ "$new_recipe_sha" != "$prev_recipe_sha" ]; then
            should=true
            echo "recipe file changed — building"
          else
            echo "unchanged — skipping"
          fi
          echo "should_build=$should" >> "$GITHUB_OUTPUT"

      - name: Checkout foyer
        if: steps.gate.outputs.should_build == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.FOYER_REPO }}
          ref: ${{ github.event.inputs.foyer_ref || 'main' }}
          path: foyer
          fetch-depth: 0

      # Per-core ccache LAYERED on top of the image-baked
      # /opt/ccache. Image already has borealis + foyer_shared +
      # libretro_frontend warmed in — this cache only carries the
      # per-core libretro upstream source TUs (the part that's
      # genuinely unique per matrix entry).
      #
      # Key inputs:
      #   - the recipe (upstream sha / flags)
      #   - foyer/player/** + foyer/CMakeLists.txt (player main /
      #     activities — links into every player nro)
      #   - Dockerfile.builder (a new image bumps shared-side TU
      #     hashes; restart per-core cache too).
      - name: Restore per-core ccache
        if: steps.gate.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: /opt/ccache
          key: ccache-${{ matrix.core }}-${{ hashFiles(format('foyer-cores/recipes/{0}.cmake', matrix.core), 'foyer/player/**', 'foyer/CMakeLists.txt', 'foyer-cores/.github/Dockerfile.builder') }}
          restore-keys: |
            ccache-${{ matrix.core }}-

      - name: Configure ccache
        if: steps.gate.outputs.should_build == 'true'
        run: |
          # /opt/ccache is the path the builder image baked the
          # shared TUs into. Cap at 500 MB so per-core overlays
          # stay bounded; ccache LRU-evicts when over.
          ccache --max-size=500M
          ccache --zero-stats
          ccache --show-config | head -8
          # devkitA64 wraps the compilers — content-hash so ccache
          # sees the actual binary not the wrapper.
          echo "CCACHE_COMPILERCHECK=content"  >> "$GITHUB_ENV"
          echo "CCACHE_DIR=/opt/ccache"        >> "$GITHUB_ENV"
          # Many libretro cores hardcode __DATE__ / __TIME__ in
          # their version-string macros. time_macros tells ccache
          # to elide those tokens from its hash.
          echo "CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime,file_macro" >> "$GITHUB_ENV"

      # Direct cmake invocation rather than `cmake --preset` so newly-added
      # cores work without an entry in foyer's CMakePresets.json.
      - name: Configure
        if: steps.gate.outputs.should_build == 'true'
        env:
          DEVKITPRO: /opt/devkitpro
        working-directory: foyer
        run: |
          cmake -B build/Player-${{ matrix.core }} \
              --toolchain "$DEVKITPRO/cmake/Switch.cmake" \
              -DCMAKE_BUILD_TYPE=MinSizeRel \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DBUILD_BROWSER=OFF \
              -DBUILD_PLAYER=ON \
              -DFOYER_CORE=${{ matrix.core }}

      - name: Build
        if: steps.gate.outputs.should_build == 'true'
        working-directory: foyer
        run: |
          # Cap parallelism per-core. puae's libretro-uae has huge
          # cycle-accurate Amiga chipset TUs (cycle-exact custom
          # blitter / paula / cia) that each pull ~1.5 GB resident
          # at -O2/MinSizeRel through GCC 15 — three of those in
          # flight OOMs the 16 GB runner, which manifests as a
          # silent kill ~45 minutes in. Cap to 1.
          JOBS=$(nproc)
          case "${{ matrix.core }}" in
            puae) JOBS=1 ;;
          esac
          cmake --build build/Player-${{ matrix.core }} -j "$JOBS"
          ccache --show-stats | head -8 || true

      - name: Stage artefact
        if: steps.gate.outputs.should_build == 'true'
        working-directory: foyer
        run: |
          mkdir -p ../out
          cp build/Player-${{ matrix.core }}/foyer-${{ matrix.core }}.nro ../out/

      - name: Upload artefact
        if: steps.gate.outputs.should_build == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: foyer-${{ matrix.core }}
          path: out/foyer-${{ matrix.core }}.nro

  release:
    needs: [plan, build]
    # always(): publish whatever DID build even if one of the matrix jobs
    # failed. fail-fast is off so the rest of the matrix runs regardless.
    # The artefact bundle + previous manifest determine what makes it in.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout foyer-cores
        uses: actions/checkout@v5

      - name: Download fresh artefacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Fetch previous manifest
        run: |
          # 404 is fine for the first release — script handles missing prev.
          mkdir -p prev
          curl -fsSL -o prev/manifest.json \
            "${{ needs.plan.outputs.prev_manifest_url }}" || echo "no prior manifest"

      - name: Build combined manifest
        run: |
          mkdir -p out
          # Copy freshly built nros into out/ — those get attached to the
          # release. Inherited entries don't need their nro re-uploaded; the
          # manifest URL already points at the older release.
          [ -d artifacts ] && cp -v artifacts/foyer-*.nro out/ 2>/dev/null || true

          python3 .github/scripts/build_manifest.py \
            --tag "${{ needs.plan.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --recipes-dir recipes \
            --artifacts-dir artifacts \
            --prev-manifest prev/manifest.json \
            --out out/manifest.json

          if ls out/*.nro >/dev/null 2>&1; then
            ( cd out && sha256sum foyer-*.nro > sha256sums.txt )
          else
            touch out/sha256sums.txt
          fi
          echo '--- manifest summary ---'
          jq '{version, total: (.cores|length), fresh: [.cores[]|select(.last_built_tag=="${{ needs.plan.outputs.tag }}")]|length}' out/manifest.json

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag='${{ needs.plan.outputs.tag }}'
          # Title surfaces the fresh-vs-inherit split so the release index is
          # informative at a glance.
          fresh=$(jq -r --arg t "$tag" '[.cores[]|select(.last_built_tag==$t)]|length' out/manifest.json)
          total=$(jq -r '.cores|length' out/manifest.json)
          title="$tag — $fresh of $total cores rebuilt"

          # For schedule / dispatch the ref isn't a tag, so we create one
          # pointing at the workflow's commit. For push events the tag
          # already exists; gh release create errors if we try again — use
          # gh release upload + edit instead.
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" out/manifest.json out/sha256sums.txt out/*.nro \
              --clobber --repo "${{ github.repository }}" || true
            gh release edit "$tag" --title "$title" --repo "${{ github.repository }}"
          else
            args=(out/manifest.json out/sha256sums.txt)
            if ls out/foyer-*.nro >/dev/null 2>&1; then
              args+=(out/foyer-*.nro)
            fi
            gh release create "$tag" "${args[@]}" \
              --target "${GITHUB_SHA}" \
              --title "$title" \
              --generate-notes \
              --repo "${{ github.repository }}"
          fi
